name: Build Pelican AV/VC APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/release.jks \
            -alias pelican \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pelican2024 -keypass pelican2024 \
            -dname "CN=Pelican,O=Pelican,C=IN"

      - name: Build Release APK
        run: gradlew :app:assembleRelease
        env:
          KEYSTORE_PASSWORD: pelican2024
          KEY_ALIAS: pelican
          KEY_PASSWORD: pelican2024

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Pelican-AVVC-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Pelican-AVVC-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
