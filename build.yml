name: Build Pelican AV/VC APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle ──────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 4. Make gradlew executable ───────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Generate keystore (auto, no setup needed) ─────────
      - name: Generate release keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/release.jks \
            -alias pelican \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass pelican2024 \
            -keypass pelican2024 \
            -dname "CN=Pelican,OU=AV,O=Pelican,L=Mumbai,S=Maharashtra,C=IN"

      # ── 6. Build release APK ─────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PASSWORD: pelican2024
          KEY_ALIAS: pelican
          KEY_PASSWORD: pelican2024

      # ── 7. Also build debug APK (always works as fallback) ───
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ── 8. Rename APKs nicely ────────────────────────────────
      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/Pelican_AVVC_v1.0_release.apk || true
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/Pelican_AVVC_v1.0_debug.apk || true

      # ── 9. Upload release APK ────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Pelican-AVVC-Release-APK
          path: app/build/outputs/apk/release/Pelican_AVVC_v1.0_release.apk
          retention-days: 30

      # ── 10. Upload debug APK (install-anywhere fallback) ─────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Pelican-AVVC-Debug-APK
          path: app/build/outputs/apk/debug/Pelican_AVVC_v1.0_debug.apk
          retention-days: 30
